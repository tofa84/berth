name: Tests

# Run the Layer-A unit tests (berthTests) on every push / PR to main.
#
# These tests are fully hermetic — pure decision logic (argv building, formatters,
# model mapping, state enums, log streaming) with NO running `container` engine and
# no network — so they pass on a stock GitHub runner. Ad-hoc code signing (identity
# "-") mirrors scripts/release.sh, so no signing secrets are needed.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

# A newer push to the same ref cancels an in-flight run.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-26      # Apple Silicon, Xcode 26 preinstalled (matches release.yml)
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26 and show toolchain
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version
          swift --version

      # Same cache key as release.yml so both workflows share resolved SwiftPM
      # dependencies (apple/container pulls containerization + swift-nio — heavy).
      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('berth.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Run tests
        run: |
          xcodebuild \
            -project berth.xcodeproj \
            -scheme berth \
            -configuration Debug \
            -destination 'platform=macOS,arch=arm64' \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            test

      # Attach the .xcresult bundle so failures are inspectable, even on red runs.
      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
          if-no-files-found: warn
